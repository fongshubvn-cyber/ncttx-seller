<svg viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C17F3E" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#C17F3E" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3D2B1F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coinFill" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#5C3D2E"/>
      <stop offset="100%" stop-color="#2A1810"/>
    </radialGradient>
    <pattern id="bgdots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.75" fill="#C17F3E" opacity="0.1"/>
    </pattern>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBloom">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" fill="#2A1810"/>
  <rect width="480" height="480" fill="url(#bgdots)"/>

  <!-- Central amber bloom -->
  <circle cx="240" cy="240" r="240" fill="url(#glow)"/>

  <!-- Vertical grid lines (LP2 decoration) -->
  <g opacity="0.05" stroke="#E8DFD0" stroke-width="0.5">
    <line x1="120" y1="0" x2="120" y2="480"/>
    <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="360" y1="0" x2="360" y2="480"/>
  </g>

  <!-- ── OUTER RING (guide for 13 dots) ── -->
  <circle cx="240" cy="240" r="188" stroke="rgba(193,127,62,0.1)" stroke-width="1" stroke-dasharray="3 6"/>

  <!-- ── 13 SCENT DOTS (evenly spaced, r=188) ── -->
  <!-- i=0 Hương Thảo #9CAF88 : 240, 52 -->
  <circle cx="240" cy="52" r="7" fill="#9CAF88" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=1 Sả Java #C9C46A : 326.6, 76.7 -->
  <circle cx="327" cy="77" r="7" fill="#C9C46A" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=2 Khuynh Diệp #6BAF8F : 394.2, 133.5 -->
  <circle cx="394" cy="134" r="7" fill="#6BAF8F" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=3 Lá Xông #8FAA6B : 427.0, 217.3 -->
  <circle cx="427" cy="217" r="7" fill="#8FAA6B" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=4 Phong Lữ #C48E9A : 416.0, 306.8 -->
  <circle cx="416" cy="307" r="7" fill="#C48E9A" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=5 Cam #E0A04A : 364.9, 380.8 -->
  <circle cx="365" cy="381" r="7" fill="#E0A04A" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=6 Sả Chanh #D4C86A : 285.0, 428.2 -->
  <circle cx="285" cy="428" r="7" fill="#D4C86A" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=7 Bạc Hà #7ABFB0 : 195.0, 428.2 -->
  <circle cx="195" cy="428" r="7" fill="#7ABFB0" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=8 Oải Hương #B09CC4 : 115.1, 380.8 -->
  <circle cx="115" cy="381" r="7" fill="#B09CC4" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=9 Quế #C4875A : 64.0, 306.8 -->
  <circle cx="64" cy="307" r="7" fill="#C4875A" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=10 Trắc Bách Diệp #7A9A6B : 53.0, 217.3 -->
  <circle cx="53" cy="217" r="7" fill="#7A9A6B" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=11 Cây Lá Bạc #A0B8A0 : 85.8, 133.5 -->
  <circle cx="86" cy="134" r="7" fill="#A0B8A0" opacity="0.88" filter="url(#dotGlow)"/>
  <!-- i=12 Quýt #E8973A : 153.4, 76.7 (Mới — slightly larger) -->
  <circle cx="153" cy="77" r="9" fill="#E8973A" opacity="0.95" filter="url(#dotGlow)"/>
  <!-- Quýt Mới spark -->
  <circle cx="153" cy="77" r="13" fill="none" stroke="#E8973A" stroke-width="1" opacity="0.35" stroke-dasharray="2 3"/>

  <!-- ── COIN OUTER HALO ── -->
  <circle cx="240" cy="240" r="152" fill="rgba(193,127,62,0.04)" filter="url(#softBloom)"/>
  <circle cx="240" cy="240" r="152" fill="none" stroke="rgba(193,127,62,0.08)" stroke-width="18"/>

  <!-- ── COIN BODY ── -->
  <circle cx="240" cy="240" r="133" fill="url(#coinFill)"/>
  <!-- Inner shine ring -->
  <circle cx="240" cy="240" r="131" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Dashed border (matches CSS original) -->
  <circle cx="240" cy="240" r="130" fill="none" stroke="rgba(193,127,62,0.5)" stroke-width="2.5" stroke-dasharray="7 5"/>

  <!-- ── 10K TEXT ── -->
  <text x="240" y="232" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="76" font-weight="700"
    fill="#E0AA6A" opacity="0.95">10K</text>
  <text x="240" y="258" text-anchor="middle"
    font-family="Georgia,serif" font-size="13"
    fill="rgba(224,170,106,0.55)">— / lọ —</text>
  <text x="240" y="278" text-anchor="middle"
    font-family="Arial,sans-serif" font-size="8.5"
    letter-spacing="1.5" fill="rgba(249,246,241,0.45)">TINH DẦU NGUYÊN CHẤT</text>
  <text x="240" y="292" text-anchor="middle"
    font-family="Arial,sans-serif" font-size="8.5"
    letter-spacing="1.2" fill="rgba(249,246,241,0.38)">CAO NGUYÊN ĐÀ LẠT</text>

  <!-- ── BOTANICAL ACCENTS (corners) ── -->
  <!-- Top-left -->
  <g opacity="0.22">
    <path d="M22 22 C32 55 20 80 28 110" stroke="#6B8F4E" stroke-width="1.5" fill="none"/>
    <ellipse cx="40" cy="45" rx="14" ry="6" fill="#6B8F4E" transform="rotate(-35 40 45)"/>
    <ellipse cx="24" cy="72" rx="12" ry="5" fill="#6B8F4E" transform="rotate(18 24 72)"/>
    <ellipse cx="36" cy="96" rx="11" ry="5" fill="#6B8F4E" transform="rotate(-25 36 96)"/>
  </g>
  <!-- Top-right -->
  <g opacity="0.18">
    <path d="M458 18 C448 50 460 75 452 105" stroke="#6B8F4E" stroke-width="1.5" fill="none"/>
    <ellipse cx="440" cy="40" rx="13" ry="5" fill="#6B8F4E" transform="rotate(-145 440 40)"/>
    <ellipse cx="456" cy="68" rx="11" ry="4" fill="#6B8F4E" transform="rotate(-160 456 68)"/>
  </g>
  <!-- Bottom-left -->
  <g opacity="0.18">
    <path d="M24 462 C36 432 22 408 32 378" stroke="#6B8F4E" stroke-width="1.3" fill="none"/>
    <ellipse cx="38" cy="448" rx="12" ry="5" fill="#6B8F4E" transform="rotate(30 38 448)"/>
    <ellipse cx="26" cy="420" rx="10" ry="4" fill="#6B8F4E" transform="rotate(15 26 420)"/>
  </g>
  <!-- Bottom-right -->
  <g opacity="0.2">
    <path d="M456 458 C444 428 458 404 448 374" stroke="#6B8F4E" stroke-width="1.3" fill="none"/>
    <ellipse cx="442" cy="444" rx="13" ry="5" fill="#6B8F4E" transform="rotate(-150 442 444)"/>
    <ellipse cx="454" cy="416" rx="11" ry="4" fill="#6B8F4E" transform="rotate(-165 454 416)"/>
  </g>

  <!-- ── OIL DROPS (floating near coin) ── -->
  <path d="M148 200 C148 194 144 190 148 184 C152 190 148 194 148 200Z" fill="#C17F3E" opacity="0.7" filter="url(#dotGlow)"/>
  <path d="M336 162 C336 157 332 153 336 147 C340 153 336 157 336 162Z" fill="#E0AA6A" opacity="0.65" filter="url(#dotGlow)"/>
  <path d="M162 316 C162 311 158 307 162 301 C166 307 162 311 162 316Z" fill="#C17F3E" opacity="0.55" filter="url(#dotGlow)"/>

  <!-- ── 13 HƯƠNG LABEL (bottom) ── -->
  <text x="240" y="472" text-anchor="middle"
    font-family="Arial,sans-serif" font-size="8" letter-spacing="2.5"
    fill="rgba(193,127,62,0.45)">13 HƯƠNG · ĐỒNG GIÁ · ĐÀ LẠT 2013</text>
</svg>
