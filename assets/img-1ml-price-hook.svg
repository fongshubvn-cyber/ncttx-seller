<svg viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="kgrain" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="0.65" fill="#8B6555" opacity="0.1"/>
    </pattern>
    <linearGradient id="kbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0E8DA"/>
      <stop offset="100%" stop-color="#E4D8C8"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF3E8"/>
      <stop offset="100%" stop-color="#F2E6D0"/>
    </linearGradient>
    <filter id="cs">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3D2B1F" flood-opacity="0.12"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#kbg)"/>
  <rect width="900" height="260" fill="url(#kgrain)"/>

  <!-- Subtle top/bottom borders -->
  <rect x="0" y="0" width="900" height="2" fill="#C17F3E" opacity="0.2"/>
  <rect x="0" y="258" width="900" height="2" fill="#C17F3E" opacity="0.15"/>

  <!-- ── COLUMN 1: Cà phê sáng ── (x 0–300) -->
  <g opacity="0.72">
    <!-- Coffee cup -->
    <!-- Saucer -->
    <ellipse cx="150" cy="185" rx="52" ry="10" fill="#C4A882" opacity="0.5"/>
    <!-- Cup body -->
    <path d="M112 145 Q110 185 148 188 Q186 188 188 145 Z" fill="#D4B896"/>
    <path d="M112 145 Q110 185 148 188 Q186 188 188 145 Z" fill="#C9A878" opacity="0.4"/>
    <!-- Cup rim -->
    <ellipse cx="150" cy="145" rx="38" ry="9" fill="#C9A878"/>
    <ellipse cx="150" cy="145" rx="34" ry="7" fill="#A08060"/>
    <!-- Inner liquid (coffee) -->
    <ellipse cx="150" cy="148" rx="30" ry="5" fill="#5C3820"/>
    <!-- Handle -->
    <path d="M188 156 C202 156 210 162 210 170 C210 178 202 184 188 184" stroke="#C9A878" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Steam wisps -->
    <path d="M130 135 C128 125 132 118 130 108" stroke="#8B6555" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M150 130 C148 118 152 110 150 98" stroke="#8B6555" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M170 134 C168 124 172 116 170 106" stroke="#8B6555" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- Price label above -->
    <text x="150" y="72" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#7A6355" opacity="0.7">Cà phê sáng</text>
    <text x="150" y="92" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#8B6555">~25k</text>
    <!-- Strikethrough comparison note -->
    <text x="150" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#A09080" letter-spacing="0.5">uống hết trong 3 phút</text>
  </g>

  <!-- ── DIVIDER 1 ── -->
  <line x1="300" y1="40" x2="300" y2="220" stroke="#D6CBBA" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="300" y="140" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#C17F3E" opacity="0.5">vs</text>

  <!-- ── COLUMN 2: Tinh dầu 1ml — CENTER HERO ── (x 300–600) -->
  <!-- Highlight card -->
  <rect x="308" y="20" width="284" height="220" rx="16" fill="url(#highlight)" filter="url(#cs)"/>
  <rect x="308" y="20" width="284" height="3" rx="1.5" fill="#C17F3E" opacity="0.6"/>
  <!-- Glow behind bottle -->
  <circle cx="450" cy="138" r="70" fill="#C17F3E" opacity="0.06" filter="url(#glow)"/>
  <!-- Tiny bottle illustration -->
  <!-- Body -->
  <rect x="435" y="100" width="30" height="75" rx="5" fill="#6B8F4E" opacity="0.55"/>
  <rect x="435" y="100" width="30" height="75" rx="5" fill="#E8DFD0" opacity="0.3"/>
  <!-- Glass edge highlight -->
  <rect x="435" y="100" width="5" height="75" rx="2.5" fill="white" opacity="0.1"/>
  <!-- Label -->
  <rect x="437" y="110" width="26" height="45" rx="3" fill="#FDFBF7" opacity="0.94"/>
  <text x="450" y="123" text-anchor="middle" font-family="Georgia,serif" font-size="5.5" font-weight="700" fill="#2A1810">TINH DẦU</text>
  <text x="450" y="133" text-anchor="middle" font-family="Georgia,serif" font-size="5" font-style="italic" fill="#C17F3E">Nguyên Chất</text>
  <line x1="439" y1="138" x2="461" y2="138" stroke="#D6CBBA" stroke-width="0.5"/>
  <text x="450" y="147" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#7A6355">Đà Lạt · 2013</text>
  <!-- Neck -->
  <rect x="440" y="89" width="20" height="13" rx="3" fill="#4E3525"/>
  <!-- Bulb -->
  <ellipse cx="450" cy="84" rx="12" ry="8" fill="#3D2B1F"/>
  <!-- Cap -->
  <rect x="441" y="71" width="18" height="15" rx="3" fill="#2A1810"/>
  <!-- Tip -->
  <line x1="450" y1="71" x2="450" y2="61" stroke="#2A1810" stroke-width="3"/>
  <!-- Oil drop -->
  <path d="M449 59 C449 54 445 49 449 43 C453 49 449 54 449 59Z" fill="#C17F3E" opacity="0.9"/>
  <!-- Shadow -->
  <ellipse cx="450" cy="177" rx="18" ry="5" fill="#3D2B1F" opacity="0.12"/>

  <!-- Price — large, centered -->
  <text x="450" y="54" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#C17F3E" opacity="0.7">chỉ</text>
  <text x="370" y="54" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#7A6355" opacity="0.6">Tinh dầu 1ml</text>

  <!-- 10K price anchor -->
  <text x="450" y="214" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#C17F3E" opacity="0.95">10k</text>
  <text x="450" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" fill="#7A6355" letter-spacing="0.5">mùi hương ở lại cả ngày</text>

  <!-- Star/badge top right of card -->
  <circle cx="576" cy="38" r="22" fill="#C17F3E" opacity="0.9"/>
  <text x="576" y="33" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="white">RẺ</text>
  <text x="576" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="white">HƠN</text>

  <!-- ── DIVIDER 2 ── -->
  <line x1="600" y1="40" x2="600" y2="220" stroke="#D6CBBA" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="600" y="140" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#8B6555" opacity="0.5">=</text>

  <!-- ── COLUMN 3: 5 lọ khám phá ── (x 600–900) -->
  <g>
    <text x="750" y="72" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#7A6355" opacity="0.75">5 lọ tự chọn</text>
    <text x="750" y="92" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#3D2B1F">50k</text>

    <!-- 5 mini bottle icons -->
    <g transform="translate(690, 112)">
      <!-- bottle 1 -->
      <rect x="0" y="14" width="16" height="50" rx="3" fill="#9CAF88" opacity="0.7"/>
      <rect x="3" y="8" width="10" height="8" rx="2" fill="#5C4535"/>
      <ellipse cx="8" cy="6" rx="7" ry="5" fill="#3D2B1F"/>
      <!-- bottle 2 -->
      <rect x="24" y="10" width="16" height="54" rx="3" fill="#B09CC4" opacity="0.7"/>
      <rect x="27" y="4" width="10" height="8" rx="2" fill="#5C4535"/>
      <ellipse cx="32" cy="2" rx="7" ry="5" fill="#3D2B1F"/>
      <!-- bottle 3 (tallest) -->
      <rect x="48" y="4" width="16" height="60" rx="3" fill="#7ABFB0" opacity="0.7"/>
      <rect x="51" y="-2" width="10" height="8" rx="2" fill="#5C4535"/>
      <ellipse cx="56" cy="-4" rx="7" ry="5" fill="#3D2B1F"/>
      <!-- bottle 4 -->
      <rect x="72" y="10" width="16" height="54" rx="3" fill="#E0A04A" opacity="0.7"/>
      <rect x="75" y="4" width="10" height="8" rx="2" fill="#5C4535"/>
      <ellipse cx="80" cy="2" rx="7" ry="5" fill="#3D2B1F"/>
      <!-- bottle 5 -->
      <rect x="96" y="14" width="16" height="50" rx="3" fill="#E8973A" opacity="0.75"/>
      <rect x="99" y="8" width="10" height="8" rx="2" fill="#5C4535"/>
      <ellipse cx="104" cy="6" rx="7" ry="5" fill="#3D2B1F"/>
      <!-- labels -->
      <rect x="2" y="22" width="12" height="24" rx="1.5" fill="white" opacity="0.85"/>
      <rect x="26" y="18" width="12" height="26" rx="1.5" fill="white" opacity="0.85"/>
      <rect x="50" y="12" width="12" height="28" rx="1.5" fill="white" opacity="0.85"/>
      <rect x="74" y="18" width="12" height="26" rx="1.5" fill="white" opacity="0.85"/>
      <rect x="98" y="22" width="12" height="24" rx="1.5" fill="white" opacity="0.85"/>
      <!-- ground shadow -->
      <ellipse cx="56" cy="68" rx="60" ry="7" fill="#3D2B1F" opacity="0.08"/>
    </g>

    <text x="750" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#7A6355" letter-spacing="0.5">khám phá 5 hương yêu thích</text>
  </g>

  <!-- ── CENTRAL MESSAGE (bottom bar) ── -->
  <rect x="0" y="242" width="900" height="18" fill="#3D2B1F" opacity="0.06"/>
  <text x="450" y="254" text-anchor="middle" font-family="Georgia,serif" font-size="10"
        letter-spacing="2" fill="#C17F3E" opacity="0.65">
    ITO HƠNMỘT LY CÀ PHÊ · NHƯNG MÙI HƯƠNG Ở LẠI LÂU HƠN
  </text>

  <!-- Decorative dried sprig bottom-left -->
  <g opacity="0.3">
    <line x1="20" y1="255" x2="70" y2="248" stroke="#8B6914" stroke-width="1"/>
    <ellipse cx="25" cy="253" rx="5" ry="2" fill="#6B8F4E" transform="rotate(-15 25 253)"/>
    <ellipse cx="35" cy="251" rx="5" ry="2" fill="#6B8F4E" transform="rotate(-10 35 251)"/>
    <ellipse cx="45" cy="250" rx="5" ry="2" fill="#6B8F4E" transform="rotate(-5 45 250)"/>
    <ellipse cx="55" cy="249" rx="5" ry="2" fill="#4E6B38" transform="rotate(0 55 249)"/>
  </g>
  <!-- Decorative dried sprig bottom-right -->
  <g opacity="0.3">
    <line x1="880" y1="255" x2="830" y2="248" stroke="#8B6914" stroke-width="1"/>
    <ellipse cx="875" cy="253" rx="5" ry="2" fill="#6B8F4E" transform="rotate(15 875 253)"/>
    <ellipse cx="865" cy="251" rx="5" ry="2" fill="#6B8F4E" transform="rotate(10 865 251)"/>
    <ellipse cx="855" cy="250" rx="5" ry="2" fill="#6B8F4E" transform="rotate(5 855 250)"/>
    <ellipse cx="845" cy="249" rx="5" ry="2" fill="#4E6B38" transform="rotate(0 845 249)"/>
  </g>
</svg>
