<svg viewBox="0 0 640 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grain" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.7" fill="#7A6355" opacity="0.1"/>
    </pattern>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#E8DFD0"/>
    </linearGradient>
    <linearGradient id="bottleGlass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B8F4E" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#E8DFD0" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#6B8F4E" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="bottleGlassAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6555" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#E0AA6A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B6555" stop-opacity="0.38"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3D2B1F" flood-opacity="0.14"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: kraft paper surface -->
  <rect width="640" height="400" fill="url(#paperGrad)"/>
  <rect width="640" height="400" fill="url(#grain)"/>

  <!-- Warm light from top-right -->
  <ellipse cx="580" cy="40" rx="280" ry="180" fill="#C17F3E" opacity="0.05"/>

  <!-- ── KRAFT PAPER CARD (center-left) ── -->
  <rect x="40" y="80" width="220" height="240" rx="4" fill="#EDE6D8" filter="url(#shadow)"/>
  <rect x="40" y="80" width="220" height="4" rx="2" fill="#C17F3E" opacity="0.4"/>
  <!-- Handwriting-style lines -->
  <line x1="60" y1="120" x2="240" y2="120" stroke="#D6CBBA" stroke-width="0.8"/>
  <line x1="60" y1="140" x2="240" y2="140" stroke="#D6CBBA" stroke-width="0.8"/>
  <line x1="60" y1="160" x2="200" y2="160" stroke="#D6CBBA" stroke-width="0.8"/>
  <line x1="60" y1="200" x2="240" y2="200" stroke="#D6CBBA" stroke-width="0.8"/>
  <line x1="60" y1="220" x2="220" y2="220" stroke="#D6CBBA" stroke-width="0.8"/>
  <line x1="60" y1="240" x2="190" y2="240" stroke="#D6CBBA" stroke-width="0.8"/>
  <!-- Title on card -->
  <text x="60" y="108" font-family="Georgia,serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#3D2B1F" opacity="0.7">TINH DẦU 1ML</text>
  <!-- Small text on ruled lines -->
  <text x="60" y="134" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#7A6355" opacity="0.7">Hương Thảo · Sả Java · Khuynh</text>
  <text x="60" y="154" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#7A6355" opacity="0.65">Diệp · Phong Lữ · Oải Hương</text>
  <text x="60" y="194" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#7A6355" opacity="0.65">Bạc Hà · Quế · Sả Chanh</text>
  <text x="60" y="214" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#7A6355" opacity="0.65">Trắc Bách Diệp · Cây Lá Bạc</text>
  <text x="60" y="234" font-family="Georgia,serif" font-size="8" font-style="italic" fill="#7A6355" opacity="0.65">Lá Xông · Cam · Quýt ✦</text>
  <!-- Price stamp on card -->
  <circle cx="190" cy="295" r="30" fill="none" stroke="#C17F3E" stroke-width="1.5" opacity="0.5"/>
  <circle cx="190" cy="295" r="25" fill="none" stroke="#C17F3E" stroke-width="0.8" opacity="0.3"/>
  <text x="190" y="292" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="700" fill="#C17F3E" opacity="0.8">10K</text>
  <text x="190" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C17F3E" opacity="0.65">/ lọ</text>

  <!-- ── 3 SMALL 1ML BOTTLES (right side, arranged) ── -->

  <!-- Bottle 1 — center: cx=380, standing upright -->
  <g filter="url(#shadow)">
    <!-- shadow -->
    <ellipse cx="380" cy="336" rx="16" ry="5" fill="#3D2B1F" opacity="0.12"/>
    <!-- body -->
    <rect x="367" y="248" width="26" height="86" rx="4" fill="url(#bottleGlass)"/>
    <!-- label -->
    <rect x="369" y="262" width="22" height="48" rx="2" fill="#FDFBF7" opacity="0.9"/>
    <text x="380" y="278" text-anchor="middle" font-family="Georgia,serif" font-size="5" font-weight="700" fill="#3D2B1F">TINH DẦU</text>
    <text x="380" y="288" text-anchor="middle" font-family="Georgia,serif" font-size="4.5" font-style="italic" fill="#C17F3E">Oải Hương</text>
    <line x1="371" y1="293" x2="389" y2="293" stroke="#D6CBBA" stroke-width="0.5"/>
    <text x="380" y="301" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#7A6355">1 ml · 10k</text>
    <!-- neck -->
    <rect x="374" y="236" width="12" height="14" rx="2" fill="#5C3D2E"/>
    <!-- dropper bulb -->
    <ellipse cx="380" cy="230" rx="9" ry="7" fill="#3D2B1F"/>
    <!-- cap -->
    <rect x="372" y="218" width="16" height="14" rx="3" fill="#2A1810"/>
    <!-- shine -->
    <rect x="375" y="220" width="4" height="6" rx="1" fill="#5C3D2E" opacity="0.6"/>
  </g>

  <!-- Bottle 2 — slightly right + taller: cx=440 -->
  <g filter="url(#shadow)">
    <ellipse cx="440" cy="335" rx="14" ry="4" fill="#3D2B1F" opacity="0.1"/>
    <rect x="429" y="254" width="22" height="79" rx="3" fill="url(#bottleGlassAmber)"/>
    <rect x="431" y="266" width="18" height="42" rx="2" fill="#FDFBF7" opacity="0.9"/>
    <text x="440" y="280" text-anchor="middle" font-family="Georgia,serif" font-size="4.5" font-weight="700" fill="#3D2B1F">TINH DẦU</text>
    <text x="440" y="289" text-anchor="middle" font-family="Georgia,serif" font-size="4" font-style="italic" fill="#C17F3E">Hương Thảo</text>
    <line x1="432" y1="294" x2="448" y2="294" stroke="#D6CBBA" stroke-width="0.5"/>
    <text x="440" y="301" text-anchor="middle" font-family="Arial,sans-serif" font-size="3.8" fill="#7A6355">1 ml · 10k</text>
    <rect x="434" y="244" width="12" height="12" rx="2" fill="#5C3D2E"/>
    <ellipse cx="440" cy="238" rx="8" ry="6" fill="#3D2B1F"/>
    <rect x="433" y="228" width="14" height="12" rx="2" fill="#2A1810"/>
    <rect x="436" y="230" width="4" height="5" rx="1" fill="#5C3D2E" opacity="0.55"/>
  </g>

  <!-- Bottle 3 — cx=336, slightly shorter/behind -->
  <g filter="url(#shadow)" opacity="0.88">
    <ellipse cx="336" cy="336" rx="13" ry="4" fill="#3D2B1F" opacity="0.09"/>
    <rect x="326" y="260" width="20" height="74" rx="3" fill="url(#bottleGlass)"/>
    <rect x="328" y="272" width="16" height="38" rx="2" fill="#FDFBF7" opacity="0.88"/>
    <text x="336" y="285" text-anchor="middle" font-family="Georgia,serif" font-size="4" font-weight="700" fill="#3D2B1F">TINH DẦU</text>
    <text x="336" y="294" text-anchor="middle" font-family="Georgia,serif" font-size="3.8" font-style="italic" fill="#C17F3E">Sả Java</text>
    <line x1="329" y1="298" x2="343" y2="298" stroke="#D6CBBA" stroke-width="0.5"/>
    <text x="336" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="3.5" fill="#7A6355">1 ml · 10k</text>
    <rect x="330" y="250" width="12" height="12" rx="2" fill="#5C3D2E"/>
    <ellipse cx="336" cy="244" rx="8" ry="6" fill="#3D2B1F"/>
    <rect x="329" y="234" width="14" height="12" rx="2" fill="#2A1810"/>
    <rect x="332" y="236" width="4" height="5" rx="1" fill="#5C3D2E" opacity="0.5"/>
  </g>

  <!-- ── OIL DROP (falling from bottle 1 cap) ── -->
  <path d="M380 218 C380 213 376 208 380 202 C384 208 380 213 380 218Z" fill="#C17F3E" opacity="0.85" filter="url(#softGlow)"/>
  <!-- tiny dot in air -->
  <circle cx="380" cy="198" r="2" fill="#E0AA6A" opacity="0.7"/>

  <!-- ── DRIED BOTANICALS (scattered on kraft) ── -->
  <!-- Lavender sprig top-right -->
  <g opacity="0.5">
    <line x1="520" y1="60" x2="512" y2="160" stroke="#8B6914" stroke-width="1.2"/>
    <line x1="526" y1="58" x2="518" y2="148" stroke="#8B6914" stroke-width="1"/>
    <line x1="534" y1="62" x2="526" y2="155" stroke="#8B6914" stroke-width="1.1"/>
    <!-- lavender buds -->
    <ellipse cx="524" cy="80" rx="4" ry="7" fill="#B09CC4" transform="rotate(-5 524 80)"/>
    <ellipse cx="530" cy="78" rx="3.5" ry="6" fill="#9B89B8" transform="rotate(3 530 78)"/>
    <ellipse cx="537" cy="82" rx="4" ry="6.5" fill="#B09CC4" transform="rotate(6 537 82)"/>
    <ellipse cx="519" cy="76" rx="3" ry="5.5" fill="#9B89B8" transform="rotate(-8 519 76)"/>
    <!-- leaves -->
    <ellipse cx="515" cy="118" rx="8" ry="3" fill="#6B8F4E" transform="rotate(-25 515 118)" opacity="0.7"/>
    <ellipse cx="527" cy="128" rx="7" ry="3" fill="#6B8F4E" transform="rotate(15 527 128)" opacity="0.65"/>
  </g>

  <!-- Rosemary / herb sprig (bottom center) -->
  <g opacity="0.45">
    <line x1="480" y1="340" x2="560" y2="352" stroke="#8B6914" stroke-width="1"/>
    <ellipse cx="487" cy="337" rx="5" ry="2" fill="#6B8F4E" transform="rotate(-20 487 337)"/>
    <ellipse cx="497" cy="337" rx="5" ry="2" fill="#4E6B38" transform="rotate(-15 497 337)"/>
    <ellipse cx="507" cy="338" rx="5" ry="2" fill="#6B8F4E" transform="rotate(-10 507 338)"/>
    <ellipse cx="517" cy="339" rx="5" ry="2" fill="#4E6B38" transform="rotate(-8 517 339)"/>
    <ellipse cx="527" cy="340" rx="5" ry="2" fill="#6B8F4E" transform="rotate(-5 527 340)"/>
    <ellipse cx="537" cy="341" rx="5" ry="2" fill="#4E6B38" transform="rotate(-3 537 341)"/>
    <ellipse cx="547" cy="342" rx="5" ry="2" fill="#6B8F4E" transform="rotate(0 547 342)"/>
  </g>

  <!-- Single leaf (top left of bottles) -->
  <ellipse cx="316" cy="236" rx="16" ry="7" fill="#6B8F4E" transform="rotate(-30 316 236)" opacity="0.4"/>
  <ellipse cx="467" cy="246" rx="12" ry="5" fill="#6B8F4E" transform="rotate(20 467 246)" opacity="0.35"/>

  <!-- Scattered dried petals -->
  <ellipse cx="295" cy="355" rx="5" ry="3" fill="#C48E9A" transform="rotate(-15 295 355)" opacity="0.5"/>
  <ellipse cx="468" cy="320" rx="4" ry="2" fill="#C48E9A" transform="rotate(25 468 320)" opacity="0.45"/>
  <ellipse cx="310" cy="290" rx="4" ry="2" fill="#C48E9A" transform="rotate(-35 310 290)" opacity="0.4"/>

  <!-- ── COLOUR PALETTE STRIP (13 dots) ── -->
  <g opacity="0.75">
    <text x="320" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" letter-spacing="1.5" fill="#7A6355" opacity="0.7">13 HƯƠNG · ĐỒNG GIÁ</text>
    <!-- dots row -->
    <circle cx="280" cy="392" r="5" fill="#9CAF88"/>
    <circle cx="293" cy="392" r="5" fill="#C9C46A"/>
    <circle cx="306" cy="392" r="5" fill="#6BAF8F"/>
    <circle cx="319" cy="392" r="5" fill="#8FAA6B"/>
    <circle cx="332" cy="392" r="5" fill="#C48E9A"/>
    <circle cx="345" cy="392" r="5" fill="#E0A04A"/>
    <circle cx="358" cy="392" r="5" fill="#D4C86A"/>
    <circle cx="371" cy="392" r="5" fill="#7ABFB0"/>
    <circle cx="384" cy="392" r="5" fill="#B09CC4"/>
    <circle cx="397" cy="392" r="5" fill="#C4875A"/>
    <circle cx="410" cy="392" r="5" fill="#7A9A6B"/>
    <circle cx="423" cy="392" r="5" fill="#A0B8A0"/>
    <circle cx="436" cy="392" r="6" fill="#E8973A"/><!-- Quýt slightly larger -->
  </g>

  <!-- ── BOTTOM TEXT ── -->
  <text x="320" y="376" text-anchor="middle" font-family="Georgia,serif" font-size="8" letter-spacing="2" fill="#C17F3E" opacity="0.55">ĐÀ LẠT · TỪ 2013 · NGƯỜI ĐIẾC SẢN XUẤT</text>
</svg>
